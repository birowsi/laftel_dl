<!-- FILE: webui_index.html -->
<!-- AI_NOTE: Web frontend page. Calls backend APIs for session/login/download control plus WebUI-only 500MB split-archive, and renders live status/log stream via SSE. -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>laftel downloader</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #d1d5db;
      --accent: #0f766e;
      --accent-2: #0d9488;
      --danger: #b91c1c;
      --console-bg: #111827;
      --console-text: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }
    .wrap {
      max-width: 920px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }
    .banner {
      background: #0b1220;
      color: #86efac;
      padding: 10px 12px;
      border-radius: 10px;
      overflow-x: auto;
      border: 1px solid #1f2937;
      margin-bottom: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    p.sub { margin: 0; color: var(--sub); }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: var(--accent-2); }
    button.warn {
      background: #fff;
      color: var(--danger);
      border-color: #fecaca;
    }
    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      width: 180px;
      font-size: 14px;
    }
    select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 320px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    .status {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 8px;
      word-break: break-all;
    }
    .console {
      background: var(--console-bg);
      color: var(--console-text);
      border-radius: 10px;
      padding: 12px;
      min-height: 220px;
      max-height: 420px;
      overflow: auto;
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }
    .hint {
      margin: 0;
      padding-left: 18px;
      color: #374151;
      font-size: 14px;
    }
    .hint li { margin: 4px 0; }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--sub);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <pre class="banner">__ASCII_ART__</pre>
    <div class="card">
      <h1>laftel downloader</h1>
      <p class="sub">세션 확보 후 다운로드를 시작하세요. 모든 동작은 API를 통해 처리됩니다.</p>
    </div>
    <div class="card">
      <div class="row">
        <button class="primary" onclick="ensureSession()">세션 확보</button>
        <input id="animeId" type="number" value="__DEFAULT_ANIME_ID__" />
        <input id="episodes" type="text" placeholder="회차 범위 (예: 1-3,5,7)" />
        <button class="primary" onclick="startDownload()">다운로드 시작</button>
        <button class="warn" onclick="stopDownload()">중단 요청</button>
        <button class="warn" onclick="shutdownProgram()">프로그램 종료</button>
        <button onclick="refreshStatus()">상태 새로고침</button>
        <label class="toggle"><input id="liveStream" type="checkbox" checked /> 실시간 스트림(SSE)</label>
        <label class="toggle"><input id="autoScroll" type="checkbox" checked /> 로그 자동 스크롤</label>
      </div>
      <div id="statusLine" class="status">상태: 대기</div>
      <pre id="out" class="console">ready</pre>
    </div>
    <div class="card">
      <h3>분할압축 (WebUI 전용)</h3>
      <div class="row">
        <select id="archiveTarget">
          <option value="">압축할 다운로드 폴더 선택</option>
        </select>
        <button onclick="refreshArchiveTargets()">폴더 목록 새로고침</button>
        <button class="primary" onclick="startSplitArchive()">500MB 분할압축 시작</button>
      </div>
      <p class="sub">출력: <code>./archives/&lt;작품명&gt;.7z.001</code> 형식으로 생성됩니다.</p>
    </div>
    <div class="card">
      <h3>간단 가이드</h3>
      <ol class="hint">
        <li><strong>세션 확보</strong>를 누르고 브라우저에서 로그인/프로필 선택을 완료합니다.</li>
        <li>작품 ID를 입력하고 <strong>다운로드 시작</strong>을 누릅니다.</li>
        <li>분할압축은 다운로드 완료 후 폴더를 선택해서 실행합니다.</li>
      </ol>
    </div>
  </div>
  <script>
    const out = document.getElementById("out");
    const statusLine = document.getElementById("statusLine");
    const liveStream = document.getElementById("liveStream");
    const autoScroll = document.getElementById("autoScroll");
    const archiveTarget = document.getElementById("archiveTarget");
    const ARCHIVE_SPLIT_SIZE_MB = 500;
    let stream = null;
    let streamReconnectTimer = null;
    const setOut = (x) => out.textContent = typeof x === "string" ? x : JSON.stringify(x, null, 2);
    const setStatus = (status) => {
      const p = status.progress || {};
      const total = Number(p.total_episodes || 0);
      const processed = Number(p.processed_episodes || 0);
      const current = p.current_episode ? ` | current=${p.current_episode}화` : "";
      const prog = total > 0 ? ` | progress=${processed}/${total}${current}` : "";
      const archive = status.archive || {};
      const archiveTag = archive.running ? "running" : "idle";
      const s = `running=${status.running} | has_session=${status.has_session} | stop_requested=${status.stop_requested} | archive=${archiveTag}${prog}`;
      statusLine.textContent = `상태: ${s}`;
    };
    const applyLogLines = (lines) => {
      setOut((lines || []).join("\n") || "로그 없음");
      if (autoScroll.checked) {
        out.scrollTop = out.scrollHeight;
      }
    };

    async function api(path, options) {
      const res = await fetch(path, options);
      let data = null;
      try { data = await res.json(); } catch (_) { data = { detail: "응답 파싱 실패" }; }
      if (!res.ok) {
        const detail = data?.detail ?? `HTTP ${res.status}`;
        throw new Error(detail);
      }
      return data;
    }

    function disconnectStream() {
      if (stream) {
        stream.close();
        stream = null;
      }
      if (streamReconnectTimer) {
        clearTimeout(streamReconnectTimer);
        streamReconnectTimer = null;
      }
    }

    function scheduleStreamReconnect() {
      if (!liveStream.checked || streamReconnectTimer) return;
      streamReconnectTimer = setTimeout(() => {
        streamReconnectTimer = null;
        connectStream();
      }, 1500);
    }

    function connectStream() {
      disconnectStream();
      statusLine.textContent = "상태: 실시간 스트림 연결 중...";
      stream = new EventSource("/api/stream?limit=200");
      stream.addEventListener("snapshot", (event) => {
        try {
          const payload = JSON.parse(event.data || "{}");
          setStatus(payload.status || {});
          applyLogLines(payload.lines || []);
        } catch (_) {}
      });
      stream.addEventListener("ping", () => {});
      stream.onerror = () => {
        disconnectStream();
        statusLine.textContent = "상태: 실시간 스트림 재연결 대기 중...";
        scheduleStreamReconnect();
      };
    }

    async function ensureSession() {
      try {
        setOut("세션 확보 중...");
        const data = await api("/api/session/ensure", { method: "POST" });
        setOut(data);
        await refreshStatus();
      } catch (e) {
        if (e.message.includes("로그인이 필요합니다")) {
          const ok = confirm("로그인이 필요합니다. 로그인 창을 열까요?");
          if (!ok) {
            setOut("로그인 필요: 사용자 취소");
            return;
          }
          try {
            setOut("로그인 창 여는 중...");
            const data = await api("/api/session/login", { method: "POST" });
            setOut(data);
            await refreshStatus();
          } catch (err) {
            setOut(`로그인 실패: ${err.message}`);
          }
        } else {
          setOut(`세션 확보 실패: ${e.message}`);
        }
      }
    }

    async function refreshArchiveTargets() {
      try {
        const data = await api("/api/archive/list");
        const previous = archiveTarget.value;
        archiveTarget.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "압축할 다운로드 폴더 선택";
        archiveTarget.appendChild(placeholder);

        (data.titles || []).forEach((title) => {
          const opt = document.createElement("option");
          opt.value = title;
          opt.textContent = title;
          archiveTarget.appendChild(opt);
        });
        if (previous && (data.titles || []).includes(previous)) {
          archiveTarget.value = previous;
        }
      } catch (e) {
        setOut(`압축 폴더 목록 조회 실패: ${e.message}`);
      }
    }

    async function startSplitArchive() {
      const title = (archiveTarget.value || "").trim();
      if (!title) {
        setOut("분할압축 시작 실패: 압축할 폴더를 선택해 주세요.");
        return;
      }
      try {
        setOut(`분할압축 요청 전송 중... (${title})`);
        const data = await api("/api/archive/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ anime_title: title, split_size_mb: ARCHIVE_SPLIT_SIZE_MB })
        });
        setOut(data);
        await refreshStatus();
      } catch (e) {
        setOut(`분할압축 시작 실패: ${e.message}`);
      }
    }

    async function startDownload() {
      let dotsTimer = null;
      try {
        const animeId = Number(document.getElementById("animeId").value || "0");
        const episodes = (document.getElementById("episodes").value || "").trim();
        let dots = 0;
        setOut("다운로드 시작 요청 전송 중...");
        statusLine.textContent = "상태: 다운로드 요청 처리 중";
        dotsTimer = setInterval(() => {
          dots = (dots + 1) % 4;
          statusLine.textContent = `상태: 다운로드 요청 처리 중${".".repeat(dots)}`;
        }, 400);

        const data = await api("/api/download/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ anime_id: animeId, max_retries: 5, episodes: episodes || null })
        });
        setOut(data);
        await refreshStatus();
      } catch (e) {
        setOut(`다운로드 시작 실패: ${e.message}`);
      } finally {
        if (dotsTimer) clearInterval(dotsTimer);
      }
    }

    async function refreshStatus() {
      try {
        const status = await api("/api/status");
        const logs = await api("/api/logs?limit=200");
        setStatus(status);
        applyLogLines(logs.lines || []);
      } catch (e) {
        setOut(`상태 조회 실패: ${e.message}`);
      }
    }

    async function stopDownload() {
      try {
        const data = await api("/api/download/stop", { method: "POST" });
        setOut(data);
        await refreshStatus();
      } catch (e) {
        setOut(`중단 요청 실패: ${e.message}`);
      }
    }

    async function shutdownProgram() {
      if (!confirm("프로그램을 종료하시겠습니까? 실행 중인 서버가 종료됩니다.")) return;
      try {
        const data = await api("/api/system/shutdown", { method: "POST" });
        setOut(data);
        statusLine.textContent = "상태: 종료 요청 전송됨";
      } catch (e) {
        setOut(`프로그램 종료 실패: ${e.message}`);
      }
    }

    liveStream.addEventListener("change", () => {
      if (liveStream.checked) {
        connectStream();
      } else {
        disconnectStream();
      }
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        disconnectStream();
      } else if (liveStream.checked) {
        connectStream();
      }
    });

    if (liveStream.checked) {
      connectStream();
    } else {
      refreshStatus();
    }
    refreshArchiveTargets();
  </script>
</body>
</html>
